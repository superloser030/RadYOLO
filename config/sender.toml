# ════════════════════════════════════════════════
#  SENDER  —  노트북(fordev / jayou_n)에서 실행
#  웹캠 캡처 + 레이더(DCA1000) 송신 설정
#  IP/포트는 network.toml 참조
# ════════════════════════════════════════════════

# ─── 레벨 테이블 ─────────────────────────────────
# (TOML 규칙상 최상위 배열은 모든 [섹션] 보다 위에 있어야 함)
# 업그레이드 우선순위: chirp → fps → 해상도 → quality
#   chirp : 32/64/128  (TDM 2TX 이므로 num_loops = chirp/2)
#   fps   : frame_period_01ms = 10000 / fps   (frameCfg 5번째 인자, 0.1ms 단위)
#   est_mbps : 최악(고복잡 씬) 기준 추정 대역폭. 실측 후 보정.
# ⚠ chirp 128 @ 15fps: chirp_cycle 486us×128=62ms 로 67ms 프레임에 빡빡(여유 5ms)
#                    레벨 번호 ↓
level = [
  { chirp =  32, fps =  2, width =  854, height =  480, quality = 20, est_mbps =   4.3 },  #  1
  { chirp =  32, fps =  3, width =  854, height =  480, quality = 20, est_mbps =   6.4 },  #  2
  { chirp =  32, fps =  5, width =  854, height =  480, quality = 20, est_mbps =  10.8 },  #  3
  { chirp =  32, fps =  5, width = 1280, height =  720, quality = 20, est_mbps =  17.6 },  #  4
  { chirp =  32, fps = 10, width = 1280, height =  720, quality = 20, est_mbps =  35.4 },  #  5
  { chirp =  64, fps = 10, width = 1280, height =  720, quality = 20, est_mbps =  45.9 },  #  6
  { chirp = 128, fps = 10, width = 1280, height =  720, quality = 20, est_mbps =  66.8 },  #  7
  { chirp = 128, fps = 10, width = 1920, height = 1080, quality = 20, est_mbps =  97.9 },  #  8
  { chirp = 128, fps = 15, width = 1920, height = 1080, quality = 20, est_mbps = 146.9 },  #  9
  { chirp = 128, fps = 15, width = 1920, height = 1080, quality = 40, est_mbps = 188.9 },  # 10
]

# ─── CAMERA (웹캠 캡처 + intrinsic) ──────────────
# source of truth. 캡처 해상도/fps/quality 는 레벨 테이블에서 결정.
# intrinsic(fx..vfov)은 데스크톱(뷰어/포즈)이 사용 → main_r 이 시작 시
#   data/scene/camera.json 으로 export 하고 viewer.html 이 그걸 fetch.
[camera]
device_index = 0
max_width    = 1920    # 캡처 가능한 최대 해상도 (레벨이 이 이하로 요청)
max_height   = 1080

# intrinsic — fx,fy,cx,cy 는 1920x1080 기준
model    = "Lenovo Performance FHD Webcam"
width    = 1920
height   = 1080
fx       = 1010
fy       = 1010
cx       = 960
cy       = 540
dfov_deg = 95
hfov_deg = 87.1
vfov_deg = 56.3

# ─── DCA1000 (노트북 로컬) ───────────────────────
[dca]
data_ip        = "192.168.33.30"   # DCA → 노트북 UDP
data_port      = 4098
cli_port       = "COM3"            # 레이더 UART
cli_baud       = 115200
restart_at_seq = 70000             # 이 seq 도달 시 선제적 DCA 재시작

# ─── RADAR 고정 파라미터 ─────────────────────────
# .cfg / .mat 생성에 쓰이는 하드웨어 고정값.
# chirp 수(NumChirps)와 fps는 레벨에서 가변 → 여기엔 안 둠.
[radar]
samples_per_chirp = 256      # profileCfg numAdcSamples
num_receivers     = 4        # channelCfg RX
adc_sample_rate   = 5209     # profileCfg digOutSampleRate (ksps)
sweep_slope       = 70       # profileCfg freqSlopeConst (MHz/us)
center_freq_ghz   = 77       # profileCfg startFreq
chirp_cycle_us    = 486.14   # idleTime + rampEndTime

# ─── MODE ────────────────────────────────────────
[mode]
sender_mode   = 0    # 0 = 고정(fixed_level 사용)   1 = 자동 대역폭 측정
fixed_level   = 8    # mode 0 일 때 사용할 레벨 (위 테이블 1~10)
bw_target_pct = 80   # mode 1 일 때: 측정 대역폭의 몇 % 까지 사용할지
