<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>RadYOLO Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden;
                 font: 13px monospace; color: #ccc; }

    /* ── 레이어 (모드별 show/hide) ────────────────────────── */
    .layer { position: fixed; inset: 0; }
    #layer-2d { display: flex; align-items: center; justify-content: center; }
    #layer-3d { display: none; }                 /* 3D 는 처음엔 숨김(lazy) */

    /* 2D */
    #wrap2d { position: relative; display: inline-block; }
    #cam  { display: block; max-width: 100vw; max-height: 100vh; }
    #ov   { position: absolute; top: 0; left: 0; pointer-events: none; }

    /* 공통 정보 */
    #info { position: fixed; top: 8px; left: 8px; color: #888;
            background: rgba(0,0,0,.5); padding: 4px 8px; border-radius: 4px;
            pointer-events: none; z-index: 10; }
    #loading { position: fixed; inset: 0; display: none; align-items: center;
               justify-content: center; color: #fff; font-size: 18px;
               background: #111; z-index: 20; }

    /* ── 콘솔 (` 토글) ────────────────────────────────────── */
    #console { position: fixed; left: 0; right: 0; bottom: 0; height: 38%;
               background: rgba(0,0,0,.85); border-top: 1px solid #333;
               display: none; flex-direction: column; z-index: 30; }
    #console.open { display: flex; }
    #con-out { flex: 1; overflow-y: auto; padding: 8px 10px; line-height: 1.5;
               white-space: pre-wrap; word-break: break-word; }
    #con-out .cmd  { color: #7fb5ff; }
    #con-out .err  { color: #ff7f7f; }
    #con-out .ok   { color: #7fffb5; }
    #con-in-wrap { display: flex; border-top: 1px solid #333; }
    #con-prompt { padding: 6px 4px 6px 10px; color: #7fb5ff; }
    #con-in { flex: 1; background: transparent; border: none; outline: none;
              color: #eee; font: 13px monospace; padding: 6px 10px 6px 0; }
    #con-hint { position: fixed; right: 10px; bottom: 6px; color: #555;
                font-size: 11px; z-index: 5; pointer-events: none; }
  </style>
</head>
<body>
<div id="loading">로딩 중...</div>

<!-- 2D 레이어 -->
<div id="layer-2d" class="layer">
  <div id="wrap2d">
    <img id="cam" src="/stream" alt="webcam">
    <canvas id="ov"></canvas>
  </div>
</div>

<!-- 3D 레이어 (three.js canvas 가 여기 append) -->
<div id="layer-3d" class="layer"></div>

<div id="info"><span id="mode-label">2D</span> — RadYOLO Viewer</div>
<div id="con-hint">/ 키: 콘솔 (Esc 닫기)</div>

<!-- 콘솔 -->
<div id="console">
  <div id="con-out"></div>
  <div id="con-in-wrap">
    <span id="con-prompt">&gt;</span>
    <input id="con-in" autocomplete="off" spellcheck="false"
           placeholder="help 입력 → 명령 목록">
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ════════════════════════════════════════════════════════════════════
// 전역 상태
// ════════════════════════════════════════════════════════════════════
let mode = '2d';                 // '2d' | '3d'
let distMode = 'live';           // 거리 라벨: 'live'(최종만) | 'debug'(R+D) | 'full'(최종+R+D)
let built3d = false;             // 3D 씬 1회 빌드 여부 (lazy)
const W_REF = 1920, H_REF = 1080;

// 3D 핸들 (build3D 에서 채움 — 콘솔 set 명령이 참조)
let renderer, scene, camera, controls, pointsMat = null;
let bgPoints = null, bgGeo = null;    // 배경 포인트클라우드 (pollBgUpdate 에서 갱신)
let bgTsCache = '', _bgCamCfg = null; // DynBG 재빌드용 상태
let _calib = null;
let loadedDirs = new Set();   // 이미 로드된 obj.dir 추적
let _objCamParams = null;     // build3D에서 저장 → pollManifest에서 재사용

// ════════════════════════════════════════════════════════════════════
// 2D 레이어 — 웹캠 + bbox + 레이더 거리
// ════════════════════════════════════════════════════════════════════
const cam = document.getElementById('cam');
const ov  = document.getElementById('ov');
const ctx = ov.getContext('2d');
const COLORS = {
  person: '#ff5454', chair: '#54ff54', laptop: '#54a0ff',
  bottle: '#ffd054', keyboard: '#ff54ff', tv: '#54ffff', mouse: '#ffa054',
};

function resize2d() {
  ov.width  = cam.clientWidth  || cam.naturalWidth  || 854;
  ov.height = cam.clientHeight || cam.naturalHeight || 480;
}
cam.addEventListener('load', resize2d);
window.addEventListener('resize', resize2d);

// 거리 라벨 — R=순수 레이더(없으면 no radar), D=DA3 뎁스, fin=최종(융합) 거리
function distLabel(o) {
  const fin = o.range_m != null ? o.range_m.toFixed(2) + 'm' : '--';
  const R   = o.radar_m != null ? 'R' + o.radar_m.toFixed(2) : 'no radar';
  const D   = o.da3_m   != null ? 'D' + o.da3_m.toFixed(2)   : 'D--';
  if (distMode === 'live')  return fin;
  if (distMode === 'debug') return R + ' ' + D;
  let s = fin + ' | ' + R + ' ' + D;   // full
  if (o.az != null) {
    s += ' az' + (o.az >= 0 ? '+' : '') + o.az.toFixed(0);
    if (o.v != null) s += ' v' + (o.v >= 0 ? '+' : '') + o.v.toFixed(1);
    s += ' n' + (o.n != null ? o.n : '?');
    if (o.snr != null) s += ' snr' + o.snr.toFixed(0);
  }
  return s;
}

async function poll2d() {
  if (mode === '2d') {
    try {
      const data = await fetch('/data/scene/live_overlay.json?_=' + Date.now())
                         .then(r => r.ok ? r.json() : []);
      const sx = ov.width / W_REF, sy = ov.height / H_REF;
      ctx.clearRect(0, 0, ov.width, ov.height);
      for (const o of data) {
        const [x1, y1, x2, y2] = o.bbox;
        const c = COLORS[o.cls] || '#ffffff';
        const X = x1 * sx, Y = y1 * sy, Wd = (x2 - x1) * sx, Hd = (y2 - y1) * sy;
        ctx.lineWidth = 2; ctx.strokeStyle = c;
        ctx.strokeRect(X, Y, Wd, Hd);
        let label = o.name;
        if (o.conf != null) label += ' ' + o.conf.toFixed(2);
        label += '  ' + distLabel(o);
        ctx.font = '15px monospace';
        const tw = ctx.measureText(label).width;
        // 라벨이 캔버스 좌/우로 넘치면 안쪽으로 당김 (짤림 방지)
        let LX = Math.max(0, Math.min(X, ov.width - (tw + 8)));
        // bbox 위로 나가면(Y<19) 박스 안쪽 위로 내림
        let LY = Y - 19 < 0 ? Y + 1 : Y - 19;
        ctx.fillStyle = c;     ctx.fillRect(LX, LY, tw + 8, 19);
        ctx.fillStyle = '#000'; ctx.fillText(label, LX + 4, LY + 14);
      }
    } catch (e) {}
  }
  setTimeout(poll2d, 150);
}

// ════════════════════════════════════════════════════════════════════
// 3D 레이어 — 포인트클라우드 + GLB 모델 (legacy viewer3d 로직 + 줌 수정)
// ════════════════════════════════════════════════════════════════════
function getImageData(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve({ data: c.getContext('2d').getImageData(0, 0, img.width, img.height),
                w: img.width, h: img.height });
    };
    img.onerror = reject;
    img.src = url;
  });
}

function depthToCam(d) {
  if (_calib && _calib.model === 'log_linear') return Math.exp(_calib.a * d + _calib.b);
  // metric(Raw) 모드: depth.png 는 near=bright 정규화(vis=1-(m-min)/(max-min)).
  // d(0~1, 1=가까움) → 미터 = min + (1-d)*(max-min)
  if (_calib && _calib.model === 'metric_linear')
    return _calib.range_min_m + (1.0 - d) * (_calib.range_max_m - _calib.range_min_m);
  return 0.05 + (1.0 - d) * 1.2;     // 보정 없을 때 fallback
}

function poseToViewerState(pose, depthImg, W, H, fx, fy, cx, cy) {
  const R = pose.R;
  const [tx, ty, tz] = pose.t;
  if (!tz || tz <= 0) return null;
  const px  = Math.round(fx * tx / tz + cx);
  const py  = Math.round(fy * ty / tz + cy);
  const pxc = Math.max(0, Math.min(W - 1, px));
  const pyc = Math.max(0, Math.min(H - 1, py));
  const d   = depthImg.data.data[(pyc * W + pxc) * 4] / 255;
  const dc  = depthToCam(d);
  const vx  = (pxc - cx) / fx * dc;
  const vy  = -(pyc - cy) / fy * dc;
  const vz  = -dc;
  const F   = [1, -1, -1];
  const Rv  = R.map((row, i) => row.map((v, j) => F[i] * v * F[j]));
  return { vx, vy, vz, Rv, tz };
}

const MAX_TILT_DEG   = 45;    // pitch/roll 최대 기울기 (yaw 는 무제한)
const POSE_SCORE_MIN = 0.30;  // gigapose pose score 가 이 미만이면 회전 갱신 무시(엉뚱한 자세 차단)

// 객체 3D 위치 — bbox 중심 + 깊이. 깊이는 da3_m(raw metric) 우선:
// 배경 포인트클라우드도 같은 raw metric(depthToCam)으로 배치되므로 동일 좌표계 → 정합.
// (range_m=레이더 보정 실제미터는 배경 raw metric 과 스케일이 달라 객체가 배경을 뚫음)
// scale 은 bbox 높이×깊이로 크기 추정 — 거리로 나누지 않음(원근은 카메라가 처리).
function posFromOverlay(o, fx, fy, cx, cy) {
  if (o == null || !o.bbox) return null;
  const d = (o.da3_m != null) ? o.da3_m : o.range_m;
  if (d == null) return null;
  const bx = (o.bbox[0] + o.bbox[2]) / 2;
  const by = (o.bbox[1] + o.bbox[3]) / 2;
  const realH = Math.max(0.05, (o.bbox[3] - o.bbox[1]) / fy * d);  // bbox 높이×깊이
  return { vx: (bx - cx) / fx * d, vy: -(by - cy) / fy * d, vz: -d, scale: realH };
}

function clampTilt(Rv) {
  const mat = new THREE.Matrix4().set(
    Rv[0][0], Rv[0][1], Rv[0][2], 0,
    Rv[1][0], Rv[1][1], Rv[1][2], 0,
    Rv[2][0], Rv[2][1], Rv[2][2], 0,
    0, 0, 0, 1);
  const euler = new THREE.Euler().setFromRotationMatrix(mat, 'YXZ');
  const maxRad = MAX_TILT_DEG * Math.PI / 180;
  euler.x = Math.max(-maxRad, Math.min(maxRad, euler.x));
  euler.z = Math.max(-maxRad, Math.min(maxRad, euler.z));
  const newMat = new THREE.Matrix4().makeRotationFromEuler(euler);
  const e = newMat.elements;  // column-major
  return [
    [e[0], e[4], e[8]],
    [e[1], e[5], e[9]],
    [e[2], e[6], e[10]],
  ];
}

function _loadOneObject(obj, depthImg, W, H, fx, fy, cx, cy) {
  const loader = new GLTFLoader();
  // pose/templates 초기 로드 시도 (없으면 pollRot이 나중에 채움)
  Promise.all([
    fetch(`/data/objects/${obj.dir}/pose.json?_=${Date.now()}`).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch(`/data/objects/${obj.dir}/templates/meta.json?_=${Date.now()}`).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([pose, tmplMeta]) => {
    let vx = 0, vy = 0, vz = -1.5, Rv = [[1,0,0],[0,1,0],[0,0,1]], tz = 1.5;
    if (pose) {
      const st = poseToViewerState(pose, depthImg, W, H, fx, fy, cx, cy);
      if (st) ({ vx, vy, vz, Rv, tz } = st);
    }
    loader.load(`/data/objects/${obj.dir}/model_trellis.glb`, (gltf) => {
      const group = new THREE.Group();
      const mc = (tmplMeta && tmplMeta.mesh_center) || [0, 0, 0];
      const mr = (tmplMeta && tmplMeta.mesh_radius) || 1.0;
      gltf.scene.position.set(-mc[0], -mc[1], -mc[2]);
      gltf.scene.scale.setScalar(0.5 / mr);
      group.add(gltf.scene);
      scene.add(group);
      function applyRv(g, Rv) {
        const rm = new THREE.Matrix4().set(
          Rv[0][0], Rv[0][1], Rv[0][2], 0,
          Rv[1][0], Rv[1][1], Rv[1][2], 0,
          Rv[2][0], Rv[2][1], Rv[2][2], 0,
          0, 0, 0, 1);
        g.setRotationFromMatrix(rm);
      }
      group.position.set(vx, vy, vz);
      group.scale.setScalar(1.0 / tz);
      applyRv(group, clampTilt(Rv));
      async function pollPos() {
        if (mode === '3d') try {
          const ov = await fetch(`/data/scene/live_overlay.json?_=${Date.now()}`).then(r => r.json());
          const o  = ov.find(x => x.name === obj.dir);
          const p  = posFromOverlay(o, fx, fy, cx, cy);
          if (p) { vz = p.vz; group.position.set(p.vx, p.vy, p.vz); group.scale.setScalar(p.scale); }
        } catch (_) {}
        setTimeout(pollPos, 200);
      }
      async function pollRot() {
        if (mode === '3d') try {
          const p2 = await fetch(`/data/objects/${obj.dir}/pose.json?_=${Date.now()}`).then(r => r.json());
          // score 게이트: 낮은 score(엉뚱한 자세)는 무시하고 직전 회전 유지
          if (p2 && (p2.score == null || p2.score >= POSE_SCORE_MIN)) {
            const s2 = poseToViewerState(p2, depthImg, W, H, fx, fy, cx, cy);
            if (s2) { Rv = s2.Rv; applyRv(group, clampTilt(Rv)); }
          }
        } catch (_) {}
        setTimeout(pollRot, 1000);
      }
      pollPos(); pollRot();
      console.log('[Viewer] 오브젝트 로드:', obj.dir);
    }, undefined, (err) => console.warn(`[Viewer] ${obj.dir} GLB 로드 실패:`, err));
  });
}

async function loadObjects(depthImg, W, H, fx, fy, cx, cy) {
  const manifest = await fetch('/data/objects/manifest.json')
    .then(r => r.ok ? r.json() : []).catch(() => []);
  for (const obj of manifest) {
    if (!obj.has_model) continue;
    loadedDirs.add(obj.dir);
    _loadOneObject(obj, depthImg, W, H, fx, fy, cx, cy);
  }
}

async function pollManifest() {
  if (mode !== '3d' || !scene || !_objCamParams) return;
  try {
    const manifest = await fetch('/data/objects/manifest.json?_=' + Date.now())
      .then(r => r.ok ? r.json() : []).catch(() => []);
    const { depthImg, W, H, fx, fy, cx, cy } = _objCamParams;
    for (const obj of manifest) {
      if (loadedDirs.has(obj.dir) || !obj.has_model) continue;
      loadedDirs.add(obj.dir);
      _loadOneObject(obj, depthImg, W, H, fx, fy, cx, cy);
      console.log('[Viewer] pollManifest: 새 오브젝트 감지 →', obj.dir);
    }
  } catch(e) {}
}

function _buildPointsGeo(color, depth, maskImg, W, H, fx, fy, cx, cy) {
  const STEP = 2;
  const cols = Math.floor(W / STEP), rows = Math.floor(H / STEP);
  const positions = new Float32Array(cols * rows * 3);
  const colors    = new Float32Array(cols * rows * 3);
  let count = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const px = c * STEP, py = r * STEP, pi = (py * W + px) * 4;
    if (maskImg && maskImg.data.data[pi] > 128) continue;
    // depth/mask 가 color(W,H)와 크기 다를 수 있어 각자 크기로 인덱싱
    const dx = Math.min(depth.w - 1, Math.floor(px * depth.w / W));
    const dy = Math.min(depth.h - 1, Math.floor(py * depth.h / H));
    const dc = depthToCam(depth.data.data[(dy * depth.w + dx) * 4] / 255);
    positions[count*3]   = (px - cx) / fx * dc;
    positions[count*3+1] = -(py - cy) / fy * dc;
    positions[count*3+2] = -dc;
    colors[count*3]   = color.data.data[pi]   / 255;
    colors[count*3+1] = color.data.data[pi+1] / 255;
    colors[count*3+2] = color.data.data[pi+2] / 255;
    count++;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(0, count*3), 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors.slice(0, count*3), 3));
  return geo;
}

async function build3D() {
  const host3d = document.getElementById('layer-3d');
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  host3d.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(56.3, innerWidth / innerHeight, 0.01, 100);
  camera.position.set(0, 0, 0.8);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, -0.6);
  // ── 줌 버그 수정: 줌 범위 제한(=target 관통/무한줌 방지) + 감도 ──
  controls.minDistance = 0.2;
  controls.maxDistance = 20;
  controls.zoomSpeed   = 0.6;

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 1.0);
  dl.position.set(1, 2, 2); scene.add(dl);

  const camCfg = await fetch('/data/scene/camera.json').then(r => r.json());
  _calib = await fetch('/data/scene/depth_bg_calib.json')
    .then(r => r.ok ? r.json() : null).catch(() => null);
  if (_calib) {
    const midZ = -(_calib.range_min_m + _calib.range_max_m) / 2;
    camera.position.set(0, 0, 1);
    controls.target.set(0, 0, midZ);
    // 미터 스케일에 맞춰 줌 범위 재설정
    controls.minDistance = _calib.range_min_m * 0.3;
    controls.maxDistance = _calib.range_max_m * 4;
    controls.update();
  }

  const hasMask = await fetch('/data/scene/mask.png', { method: 'HEAD' }).then(r => r.ok).catch(() => false);
  const loads = [getImageData('/data/scene/background.jpg'), getImageData('/data/scene/depth_bg.png')];
  if (hasMask) loads.push(getImageData('/data/scene/mask.png'));
  const [color, depth, maskImg] = await Promise.all(loads);

  camera.fov = camCfg.vfov_deg; camera.updateProjectionMatrix();
  const W = color.w, H = color.h;
  const fx = camCfg.fx, fy = camCfg.fy, cx = camCfg.cx, cy = camCfg.cy;
  _bgCamCfg = { W, H, fx, fy, cx, cy };
  _objCamParams = { depthImg: depth, W, H, fx, fy, cx, cy };
  bgGeo = _buildPointsGeo(color, depth, maskImg, W, H, fx, fy, cx, cy);
  pointsMat = new THREE.PointsMaterial({ vertexColors: true, size: 0.003, sizeAttenuation: true });
  bgPoints = new THREE.Points(bgGeo, pointsMat);
  scene.add(bgPoints);

  await loadObjects(depth, W, H, fx, fy, cx, cy);
}

async function pollBgUpdate() {
  if (!bgGeo || !scene) return;
  try {
    const ts = await fetch('/data/scene/bg_ts.txt?_=' + Date.now())
      .then(r => r.ok ? r.text().then(t => t.trim()) : '').catch(() => '');
    if (!ts || ts === bgTsCache) return;
    bgTsCache = ts;
    // 배경 calib/depth/color 를 같은 _=ts 로 묶어 한 시점 스냅샷 로드(불일치 방지).
    // depth_bg 는 DynBG 만 쓰므로 라이브(현재프레임) depth 와 섞이지 않는다.
    const cb = '?_=' + ts;
    _calib = await fetch('/data/scene/depth_bg_calib.json' + cb)
      .then(r => r.ok ? r.json() : null).catch(() => null);
    const [color, depth] = await Promise.all([
      getImageData('/data/scene/background.jpg' + cb),
      getImageData('/data/scene/depth_bg.png' + cb),
    ]);
    const { W, H, fx, fy, cx, cy } = _bgCamCfg;
    // 갱신 시점엔 마스크 없이 (드러난 배경 픽셀이 마스크 영역과 겹칠 수 있음)
    const newGeo = _buildPointsGeo(color, depth, null, W, H, fx, fy, cx, cy);
    scene.remove(bgPoints);
    bgGeo.dispose();
    bgGeo = newGeo;
    bgPoints = new THREE.Points(bgGeo, pointsMat);
    scene.add(bgPoints);
    console.log('[Viewer] 배경 포인트클라우드 재빌드 (bg_ts=' + ts + ')');
  } catch (e) {
    console.warn('[Viewer] 배경 갱신 실패:', e);
  }
}

function animate3D() {
  requestAnimationFrame(animate3D);
  if (mode === '3d' && controls) { controls.update(); renderer.render(scene, camera); }
}

window.addEventListener('resize', () => {
  if (renderer) {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  }
});

// ════════════════════════════════════════════════════════════════════
// 모드 전환
// ════════════════════════════════════════════════════════════════════
async function setMode(m) {
  if (m !== '2d' && m !== '3d') throw new Error(`알 수 없는 모드: ${m} (2d|3d)`);
  mode = m;
  document.getElementById('layer-2d').style.display = (m === '2d') ? 'flex' : 'none';
  document.getElementById('layer-3d').style.display = (m === '3d') ? 'block' : 'none';
  document.getElementById('mode-label').textContent = m.toUpperCase() + '·' + distMode;
  if (m === '3d' && !built3d) {
    const loading = document.getElementById('loading');
    loading.style.display = 'flex'; loading.textContent = '3D 로딩 중...';
    try { await build3D(); built3d = true; animate3D(); setInterval(() => { if (mode === '3d') pollBgUpdate(); }, 15000); setInterval(() => pollManifest(), 10000); }
    catch (e) { conPrint('3D 로드 실패: ' + e.message, 'err'); }
    loading.style.display = 'none';
  }
}

// ════════════════════════════════════════════════════════════════════
// 콘솔 — 명령 레지스트리 (확장: COMMANDS 에 한 줄 추가)
// ════════════════════════════════════════════════════════════════════
const conOut = document.getElementById('con-out');
const conIn  = document.getElementById('con-in');
const consoleEl = document.getElementById('console');

function conPrint(text, cls) {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  conOut.appendChild(div);
  conOut.scrollTop = conOut.scrollHeight;
}

// set/get 가능한 파라미터: 이름 → {get, set}
const PARAMS = {
  zoomspeed:   { get: () => controls?.zoomSpeed,   set: v => controls.zoomSpeed = v },
  rotatespeed: { get: () => controls?.rotateSpeed, set: v => controls.rotateSpeed = v },
  panspeed:    { get: () => controls?.panSpeed,    set: v => controls.panSpeed = v },
  mindist:     { get: () => controls?.minDistance, set: v => controls.minDistance = v },
  maxdist:     { get: () => controls?.maxDistance, set: v => controls.maxDistance = v },
  damping:     { get: () => controls?.dampingFactor, set: v => controls.dampingFactor = v },
  near:        { get: () => camera?.near, set: v => { camera.near = v; camera.updateProjectionMatrix(); } },
  pointsize:   { get: () => pointsMat?.size, set: v => pointsMat.size = v },
};

const COMMANDS = {
  '2d':  { help: '2D 모드(웹캠+거리)로 전환', fn: () => setMode('2d') },
  '3d':  { help: '3D 모드(포인트클라우드)로 전환', fn: () => setMode('3d') },
  dist:  { help: 'dist <live|debug|full> — 거리 표시: live=최종만, debug=R+D, full=전부', fn: (a) => {
    const m = (a[0] || '').toLowerCase();
    if (!['live', 'debug', 'full'].includes(m)) return conPrint('live|debug|full 중 하나', 'err');
    distMode = m;
    document.getElementById('mode-label').textContent = mode.toUpperCase() + '·' + m;
    conPrint(`거리 모드 = ${m}`, 'ok');
  }},
  set:   { help: 'set <param> <value> — 표시 설정 변경', fn: (a) => {
    const [k, v] = a;
    if (!PARAMS[k]) return conPrint(`알 수 없는 param: ${k}  (help 참고)`, 'err');
    if (!controls && k !== 'pointsize') return conPrint('먼저 3d 모드로 전환하세요.', 'err');
    const num = parseFloat(v);
    if (isNaN(num)) return conPrint(`숫자가 필요: ${v}`, 'err');
    PARAMS[k].set(num);
    conPrint(`${k} = ${num}`, 'ok');
  }},
  get:   { help: 'get <param> — 현재 값 출력', fn: (a) => {
    const k = a[0];
    if (!PARAMS[k]) return conPrint(`알 수 없는 param: ${k}`, 'err');
    conPrint(`${k} = ${PARAMS[k].get()}`);
  }},
  help:  { help: '명령 목록', fn: () => {
    conPrint('── 명령 ──');
    for (const [n, c] of Object.entries(COMMANDS)) conPrint(`  ${n.padEnd(6)} ${c.help}`);
    conPrint('── set/get param ──');
    conPrint('  ' + Object.keys(PARAMS).join(', '));
  }},
};

function runCommand(line) {
  const parts = line.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  if (!cmd) return;
  conPrint('> ' + line, 'cmd');
  const c = COMMANDS[cmd];
  if (!c) return conPrint(`알 수 없는 명령: ${cmd}  (help 입력)`, 'err');
  try { c.fn(parts.slice(1)); } catch (e) { conPrint('오류: ' + e.message, 'err'); }
}

conIn.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { runCommand(conIn.value); conIn.value = ''; }
  else if (e.key === 'Escape') { consoleEl.classList.remove('open'); conIn.blur(); }
});

// / 로 콘솔 열기, Esc 로 닫기
window.addEventListener('keydown', (e) => {
  if (e.key === '/') {
    if (document.activeElement === conIn) return;   // 입력 중엔 무시
    e.preventDefault();
    consoleEl.classList.add('open');
    conIn.focus();
  } else if (e.key === 'Escape') {
    consoleEl.classList.remove('open');
    conIn.blur();
  }
});

// ════════════════════════════════════════════════════════════════════
// 시작
// ════════════════════════════════════════════════════════════════════
resize2d();
poll2d();
setMode('2d');
conPrint('RadYOLO Viewer — help 입력, ` 로 콘솔 토글');
</script>
</body>
