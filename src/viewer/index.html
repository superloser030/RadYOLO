<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RadYOLO 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; top: 12px; left: 12px;
      color: #aaa; font: 13px monospace;
      pointer-events: none;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font: 18px monospace; background: #111;
    }
  </style>
</head>
<body>
<div id="loading">로딩 중...</div>
<div id="info">마우스 드래그: 회전 | 스크롤: 줌 | 우클릭 드래그: 이동</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.001, 100);
camera.position.set(0, 0, 1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, -2.5);

// 이미지 → 픽셀 데이터 추출
function getImageData(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width;
      c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve({ data: c.getContext('2d').getImageData(0, 0, img.width, img.height), w: img.width, h: img.height });
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function build() {
  const hasMask = await fetch('mask.png', { method: 'HEAD' }).then(r => r.ok).catch(() => false);

  const loads = [getImageData('test.jpg'), getImageData('depth.png')];
  if (hasMask) loads.push(getImageData('mask.png'));

  const [color, depth, maskImg] = await Promise.all(loads);

  const W = color.w, H = color.h;
  const STEP = 2;
  const HFOV   = 75 * Math.PI / 180;  // 웹캠 수평 FOV - 카메라에 맞게 조정
  const Z_NEAR = 0.5;
  const Z_FAR  = 5.0;

  const cols = Math.floor(W / STEP);
  const rows = Math.floor(H / STEP);
  const fx = (cols / 2) / Math.tan(HFOV / 2);  // 정규화 초점거리

  const positions = [];
  const colors    = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const px = c * STEP;
      const py = r * STEP;
      const pi = (py * W + px) * 4;

      if (maskImg && maskImg.data.data[pi] > 128) continue;

      // DA3 Standard: d=1 가까움, d=0 멈
      const d = depth.data.data[pi] / 255;
      const z = Z_NEAR + (1 - d) * (Z_FAR - Z_NEAR);  // 실제 깊이

      // 원근 역투영: 평면 벽 → 3D에서도 평면
      positions.push(
        (c - cols / 2) / fx * z,
        -(r - rows / 2) / fx * z,
        -z   // 카메라가 -Z 방향을 바라봄
      );
      colors.push(
        color.data.data[pi]   / 255,
        color.data.data[pi+1] / 255,
        color.data.data[pi+2] / 255
      );
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(colors), 3));

  const mat = new THREE.PointsMaterial({
    size: 0.0025,
    vertexColors: true,
    sizeAttenuation: true
  });

  scene.add(new THREE.Points(geo, mat));
  document.getElementById('loading').style.display = 'none';
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

build().catch(e => {
  document.getElementById('loading').textContent = '로드 실패: ' + e.message;
});
animate();
</script>
</body>
</html>
